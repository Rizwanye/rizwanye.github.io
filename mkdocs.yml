site_name: iRizwan
site_url: https://irizwan.com/
site_description: iRizwan is Rizwan Ye's personal website about business-aware, data-informed, production-ready software and documenting the path toward forward deployment engineering.
site_author: Rizwan Ye
copyright: Copyright &copy; 2026 iRizwan

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  font:
    text: Manrope
    code: JetBrains Mono
  logo: assets/images/irizwan-mark.svg
  favicon: assets/images/favicon.png
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.preview
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: slate
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: slate
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Forward Deployment Engineering:
      - Overview: fde/index.md
      - Job:
          - What Is the Job: fde/job/index.md
          - Comparisons: fde/job/comparisons/index.md
          - Skills: fde/job/skills.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - material.extensions.preview:
      configurations:
        - targets:
            include:
              - index.md
              - fde/index.md
              - fde/job/comparisons/index.md
              - fde/job/index.md
              - fde/job/skills.md
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search
  - optimize:
      optimize_png: false
      print_gain: false
      print_gain_summary: false

extra:
  generator: false
  analytics:
    provider: google
    property: G-FKKMH5E4LV
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@Rizwan-Ye
      name: Rizwan Ye on YouTube
    - icon: fontawesome/brands/github
      link: https://github.com/Rizwanye
      name: Rizwan Ye on GitHub
    - icon: material/school
      link: https://scholar.google.com/citations?user=K1JBcOsAAAAJ&hl=en
      name: Rizwan Ye on Google Scholar
    - icon: material/domain
      link: https://www.crunchbase.com/person/rizwan-ye
      name: Rizwan Ye on Crunchbase
    - icon: material/printer-3d
      link: https://www.printables.com/@RizwanYe_4583879
      name: Rizwan Ye on Printables
